<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1418"></stop>
      <stop offset="0.5" stop-color="#0e2a33"></stop>
      <stop offset="1" stop-color="#06181d"></stop>
    </linearGradient>
    <radialGradient id="r" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#1a4452" stop-opacity="0.9"></stop>
      <stop offset="1" stop-color="#06181d" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="lines" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="none"></rect>
      <path d="M-1,1 l2,-2 M0,6 l6,-6 M5,7 l2,-2" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"></path>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#g)"></rect>
  <rect width="1920" height="1080" fill="url(#r)"></rect>
  <rect width="1920" height="1080" fill="url(#lines)"></rect>
  <g fill="#f5f1ea" opacity="0.35" font-family="ui-monospace, monospace" font-size="22" letter-spacing="2">
    <text x="50%" y="48%" text-anchor="middle">[ HERO VIDEO PLACEHOLDER ]</text>
    <text x="50%" y="52%" text-anchor="middle" font-size="14" opacity="0.6">drop your .mp4 at assets/hero.mp4 to replace</text>
  </g>
</svg>